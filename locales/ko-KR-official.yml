# ── buy interaction: lots modal ────────────────────────────────────────────────
buy.modal.title: "How many lots do you want?"
buy.modal.input_label: "Lots"
buy.modal.input_placeholder: "Enter number of lots"
buy.error.self_buy: "❌ You can't buy your own trade."
buy.error.invalid_amount: "❌ Invalid amount. There are only %{stock} lot(s) remaining."

# ── buy interaction: purchase confirmation ─────────────────────────────────────
buy.confirm.title: "Confirm Purchase"
buy.confirm.description: "You're buying **%{lots}** lot(s) from **%{seller}**."
buy.confirm.field_receive: "You will receive"
buy.confirm.field_give: "You will give"
buy.confirm.button_confirm: "Confirm"
buy.confirm.button_cancel: "Cancel"
buy.confirm.check_dms: "Check your DMs!"
buy.confirm.cancelled: "❌ Purchase cancelled."

# ── buy interaction: DMs ───────────────────────────────────────────────────────
buy.dm.buyer: |
  You're about to buy **x%{item_total} %{item}** in exchange for **x%{wants_total} %{wants}** (%{lots} lot(s)) from **%{seller}**.
  Go find them in-game and confirm once the trade is done.
  %{server_link}
buy.dm.seller: |
  **%{buyer}** wants to buy **x%{item_total} %{item}** from you in exchange for **x%{wants_total} %{wants}** (%{lots} lot(s)).
  Go find them in-game and confirm once done.
  %{server_link}
buy.dm.button_confirm: "Confirm Trade Done"
buy.dm.button_cancel: "Cancel"

# ── buy interaction: awaiting confirmations ────────────────────────────────────
buy.await.you_cancelled: "⚠️ You cancelled the trade."
buy.await.buyer_cancelled: "⚠️ **%{name}** cancelled the trade."
buy.await.seller_cancelled: "⚠️ **%{name}** cancelled the trade."
buy.await.waiting_for_seller: "✅ Got it! Waiting for the seller to confirm..."
buy.await.waiting_for_buyer: "✅ Got it! Waiting for the buyer to confirm..."

# ── buy interaction: trade finalised ──────────────────────────────────────────
buy.done.buyer: "✅ Trade confirmed! You gave **x%{wants_total} %{wants}** to **%{seller}** and received **x%{item_total} %{item}**. Thanks for trading!"
buy.done.seller: "✅ Trade confirmed! You gave **x%{item_total} %{item}** and received **x%{wants_total} %{wants}** from **%{buyer}**. Stock decremented."
buy.done.seller_sold_out: "✅ Trade confirmed! You gave **x%{item_total} %{item}** and received **x%{wants_total} %{wants}** from **%{buyer}** — all stock sold, post removed."

