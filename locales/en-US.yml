# ── auction: resolve (DMs sent when auction ends) ─────────────────────────────
auction.resolve.winner_dm: |
  🏆 You won the auction! You bid **%{amount} %{currency}** for **x%{quantity} %{item}**.
  Go find the seller in-game and confirm once the trade is done.
  %{server_link}
auction.resolve.seller_dm: |
  🏆 Your auction ended! **%{winner}** won with a bid of **%{amount} %{currency}** for **x%{quantity} %{item}**.
  Go find them in-game and confirm once the trade is done.
  %{server_link}
auction.resolve.winner_declined: "⚠️ **%{winner}** declined the trade. Offering to the next highest bidder..."
auction.resolve.seller_declined: "⚠️ The seller declined the trade. You will not be charged."

