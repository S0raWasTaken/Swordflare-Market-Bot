# ── buy interaction: DMs ───────────────────────────────────────────────────────
buy.dm.buyer: |
  Ye be about t' pillage **x%{item_total} %{item}** in exchange fer **x%{wants_total} %{wants}** (%{lots} lot(s)) from **%{seller}**.
  Go seek out them on th' seas and swear on it once th' plunder be done, arr.
  %{server_link}
buy.dm.seller: |
  **%{buyer}** wants t' pillage **x%{item_total} %{item}** from ye in exchange fer **x%{wants_total} %{wants}** (%{lots} lot(s)).
  Go seek out them on th' seas and swear on it once done, arr.
  %{server_link}
buy.dm.button_confirm: "Swear on it Plunder Done, arr"
buy.dm.button_cancel: "Scuttle"

