  🏆 Yer biddin' war come t' port! **%{winner}** seized wit' a wager o' **%{amount} %{currency}** fer **x%{quantity} %{item}**.
  Go seek out them on th' seas and swear on it once th' plunder be done, arr.
  %{server_link}
auction.resolve.winner_declined: "⚠️ **%{winner}** declined th' plunder. Offering t' th' next highest wagerer..."
