auction.resolve.winner_dm: |
  🏆 Ye seized th' biddin' war! Ye wager **%{amount} %{currency}** fer **x%{quantity} %{item}**.
  Go seek out th' cap'n on th' seas and swear on it once th' plunder be done, arr.
  %{server_link}
