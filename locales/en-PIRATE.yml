# ── buy interaction: trade finalised ──────────────────────────────────────────
buy.done.buyer: "✅ Plunder sworn! Ye handed over **x%{wants_total} %{wants}** t' **%{seller}** and plundered **x%{item_total} %{item}**. Ye have me thanks fer plunderin'!"
